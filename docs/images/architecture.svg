<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fb8500"/>
      <stop offset="100%" style="stop-color:#ffb703"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#fb8500" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="bold">SYSTEM ARCHITECTURE</text>

  <!-- User Box -->
  <rect x="340" y="45" width="120" height="38" rx="8" fill="#1a1a2e" stroke="#fb8500" stroke-width="2"/>
  <text x="400" y="69" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">👤 User</text>

  <!-- Arrow User → Interface -->
  <line x1="400" y1="83" x2="400" y2="105" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Interface Layer -->
  <rect x="200" y="105" width="400" height="42" rx="8" fill="#1e2a45" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="310" y="131" text-anchor="middle" fill="#4a90d9" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">💻 CLI (Click)</text>
  <line x1="395" y1="112" x2="395" y2="140" stroke="#4a90d9" stroke-width="0.8" stroke-dasharray="2"/>
  <text x="490" y="131" text-anchor="middle" fill="#4a90d9" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🌐 Streamlit UI</text>

  <!-- Arrow Interface → Core -->
  <line x1="400" y1="147" x2="400" y2="170" stroke="#fb8500" stroke-width="2"/>

  <!-- Core Engine Box -->
  <rect x="230" y="170" width="340" height="42" rx="8" fill="#2a1a0e" stroke="#fb8500" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="196" text-anchor="middle" fill="#fb8500" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">📜 HistoryTimeline Core Engine</text>

  <!-- Arrows Core → Components -->
  <line x1="300" y1="212" x2="160" y2="260" stroke="#ffb703" stroke-width="1.5"/>
  <line x1="370" y1="212" x2="330" y2="260" stroke="#ffb703" stroke-width="1.5"/>
  <line x1="430" y1="212" x2="500" y2="260" stroke="#ffb703" stroke-width="1.5"/>
  <line x1="500" y1="212" x2="660" y2="260" stroke="#ffb703" stroke-width="1.5"/>

  <!-- Component 1: Timeline Engine -->
  <rect x="70" y="260" width="180" height="50" rx="8" fill="#1a1a2e" stroke="#e76f51" stroke-width="1.5"/>
  <text x="160" y="280" text-anchor="middle" fill="#e76f51" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">⏱️ Timeline Engine</text>
  <text x="160" y="300" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">6 Event Categories • 3 Detail Levels</text>

  <!-- Component 2: Figure Profiler -->
  <rect x="260" y="260" width="150" height="50" rx="8" fill="#1a1a2e" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="335" y="280" text-anchor="middle" fill="#2a9d8f" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">👤 Figure Profiler</text>
  <text x="335" y="300" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Roles • Eras • Contributions</text>

  <!-- Component 3: Cause-Effect Analyzer -->
  <rect x="420" y="260" width="165" height="50" rx="8" fill="#1a1a2e" stroke="#e9c46a" stroke-width="1.5"/>
  <text x="502" y="280" text-anchor="middle" fill="#e9c46a" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">🔗 Cause-Effect Analyzer</text>
  <text x="502" y="300" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Chains • Long-term Impact</text>

  <!-- Component 4: Era Grouping -->
  <rect x="595" y="260" width="140" height="50" rx="8" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="665" y="280" text-anchor="middle" fill="#a78bfa" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">🏛️ Era Grouping</text>
  <text x="665" y="300" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Periodization • Legacy</text>

  <!-- Arrow Core → Ollama -->
  <line x1="400" y1="212" x2="400" y2="340" stroke="#fb8500" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Ollama/Gemma Box -->
  <rect x="290" y="340" width="220" height="42" rx="8" fill="#1a2e1a" stroke="#2a9d8f" stroke-width="2"/>
  <text x="400" y="366" text-anchor="middle" fill="#2a9d8f" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🤖 Ollama / Gemma 3 LLM</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb8500"/>
    </marker>
  </defs>
</svg>
